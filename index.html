<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF6 每日對戰紀錄</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8 font-sans">

  <div class="max-w-md mx-auto space-y-6">
    <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
      <h1 class="text-2xl font-bold text-center mb-4 text-orange-500">SF6 對戰紀錄</h1>
      <div class="flex justify-between items-center text-center">
        <div>
          <p class="text-gray-400 text-sm">今日場次</p>
          <p id="today-total" class="text-2xl font-bold">0</p>
        </div>
        <div>
          <p class="text-green-400 text-sm">勝</p>
          <p id="today-wins" class="text-2xl font-bold">0</p>
        </div>
        <div>
          <p class="text-red-400 text-sm">敗</p>
          <p id="today-losses" class="text-2xl font-bold">0</p>
        </div>
        <div>
          <p class="text-blue-400 text-sm">勝率</p>
          <p id="today-rate" class="text-2xl font-bold">0%</p>
        </div>
      </div>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">我的角色</label>
          <select id="my-char" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-orange-500 outline-none transition"></select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">對手角色</label>
          <select id="opp-char" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-orange-500 outline-none transition"></select>
        </div>

        <div class="flex gap-4 pt-2">
          <button id="btn-win" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-lg shadow transition">
            記錄：勝利 (Win)
          </button>
          <button id="btn-loss" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-lg shadow transition">
            記錄：戰敗 (Loss)
          </button>
        </div>
      </div>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
      <h2 class="text-lg font-bold mb-4 text-gray-300">歷史紀錄 (每日統計)</h2>
      <div id="history-list" class="space-y-3">
        <p class="text-gray-500 text-sm text-center">載入中...</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyCK9wEgSfO68Wfw1t9VGJWMOGcbOFc3LLA",
      authDomain: "sf6wl-d52e0.firebaseapp.com",
      projectId: "sf6wl-d52e0",
      storageBucket: "sf6wl-d52e0.firebasestorage.app",
      messagingSenderId: "942982602876",
      appId: "1:942982602876:web:475733a936b4390bc129f9",
      measurementId: "G-H7QNPQDRVE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const matchesCol = collection(db, "sf6_matches");

    // 角色清單
    const rawCharacters = [
      "Ryu", "Luke", "Jamie", "Chun-Li", "Guile", "Kimberly", "Juri", "Ken", 
      "Blanka", "Dhalsim", "E.Honda", "Dee Jay", "Manon", "Marisa", "Jp", 
      "Zangief", "Lily", "Cammy", "Rashid", "A.K.I", "Ed", "Gouki", "Vega", 
      "Terry", "Mai", "Elena", "Sagat", "C.Viper", "Alex"
    ];
    
    // 字母排序
    const characters = rawCharacters.sort((a, b) => a.localeCompare(b));

    const myCharSelect = document.getElementById('my-char');
    const oppCharSelect = document.getElementById('opp-char');

    // 取得當地日期的字串 (YYYY-MM-DD)
    function getTodayString() {
      const now = new Date();
      // 避免時區問題，手動組合 YYYY-MM-DD
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    // 初始化下拉選單
    function initSelects() {
      characters.forEach(char => {
        myCharSelect.add(new Option(char, char));
        oppCharSelect.add(new Option(char, char));
      });
      // 預設角色設定
      myCharSelect.value = "Gouki";
    }

    // 記錄對戰結果
    async function recordMatch(result) {
      const myChar = myCharSelect.value;
      const oppChar = oppCharSelect.value;
      const today = getTodayString();

      // 按鈕呈現載入狀態
      const btnWin = document.getElementById('btn-win');
      const btnLoss = document.getElementById('btn-loss');
      btnWin.disabled = true; btnLoss.disabled = true;

      try {
        await addDoc(matchesCol, {
          date: today,
          myChar: myChar,
          oppChar: oppChar,
          result: result,
          timestamp: serverTimestamp()
        });
        // 記錄完成後重新載入統計資料
        await loadStats();
      } catch (e) {
        console.error("寫入資料失敗: ", e);
        alert("儲存失敗，請檢查網路或 Firebase 設定。");
      } finally {
        btnWin.disabled = false; btnLoss.disabled = false;
      }
    }

    // 讀取並計算統計資料
    async function loadStats() {
      try {
        const q = query(matchesCol, orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        
        const stats = {};
        
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const date = data.date;
          
          if (!stats[date]) {
            stats[date] = { wins: 0, losses: 0, total: 0 };
          }
          
          stats[date].total += 1;
          if (data.result === 'win') stats[date].wins += 1;
          else if (data.result === 'loss') stats[date].losses += 1;
        });

        renderStats(stats);
      } catch (e) {
        console.error("讀取資料失敗: ", e);
        document.getElementById('history-list').innerHTML = `<p class="text-red-400 text-sm text-center">讀取失敗，請確認資料庫權限是否開啟 (需設定 Firestore Rules)</p>`;
      }
    }

    // 渲染畫面
    function renderStats(stats) {
      const today = getTodayString();
      const historyList = document.getElementById('history-list');
      historyList.innerHTML = '';

      // 更新今日數據
      if (stats[today]) {
        const t = stats[today];
        document.getElementById('today-total').textContent = t.total;
        document.getElementById('today-wins').textContent = t.wins;
        document.getElementById('today-losses').textContent = t.losses;
        const rate = t.total === 0 ? 0 : Math.round((t.wins / t.total) * 100);
        document.getElementById('today-rate').textContent = rate + '%';
      } else {
        document.getElementById('today-total').textContent = '0';
        document.getElementById('today-wins').textContent = '0';
        document.getElementById('today-losses').textContent = '0';
        document.getElementById('today-rate').textContent = '0%';
      }

      // 更新歷史數據
      const sortedDates = Object.keys(stats).sort((a, b) => b.localeCompare(a));
      
      sortedDates.forEach(date => {
        if (date === today) return; // 略過今天
        
        const d = stats[date];
        const rate = d.total === 0 ? 0 : Math.round((d.wins / d.total) * 100);
        
        const item = document.createElement('div');
        item.className = 'flex justify-between items-center bg-gray-700 p-3 rounded-lg';
        item.innerHTML = `
          <span class="text-gray-300 font-medium">${date}</span>
          <div class="text-sm flex gap-4">
            <span class="text-gray-400">總場: <span class="text-white">${d.total}</span></span>
            <span class="text-green-400">勝: <span class="text-white">${d.wins}</span></span>
            <span class="text-red-400">敗: <span class="text-white">${d.losses}</span></span>
            <span class="text-blue-400 w-12 text-right">${rate}%</span>
          </div>
        `;
        historyList.appendChild(item);
      });

      if (historyList.innerHTML === '') {
        historyList.innerHTML = '<p class="text-gray-500 text-sm text-center">尚無歷史紀錄</p>';
      }
    }

    // 綁定事件
    document.getElementById('btn-win').addEventListener('click', () => recordMatch('win'));
    document.getElementById('btn-loss').addEventListener('click', () => recordMatch('loss'));

    // 初始化執行
    initSelects();
    loadStats();

  </script>
</body>
</html>
