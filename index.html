<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SF6 每日對戰紀錄</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8 font-sans pb-20">

  <div class="max-w-md mx-auto space-y-6">
    <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
      <h1 class="text-2xl font-bold text-center mb-4 text-orange-500">SF6 對戰紀錄</h1>
      <div class="flex justify-between items-center text-center">
        <div>
          <p class="text-gray-400 text-sm">今日場次</p>
          <p id="today-total" class="text-2xl font-bold">0</p>
        </div>
        <div>
          <p class="text-green-400 text-sm">勝</p>
          <p id="today-wins" class="text-2xl font-bold">0</p>
        </div>
        <div>
          <p class="text-red-400 text-sm">敗</p>
          <p id="today-losses" class="text-2xl font-bold">0</p>
        </div>
        <div>
          <p class="text-blue-400 text-sm">勝率</p>
          <p id="today-rate" class="text-2xl font-bold">0%</p>
        </div>
      </div>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">我的角色</label>
          <select id="my-char" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-orange-500 outline-none transition"></select>
        </div>
        
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">對手角色</label>
          <select id="opp-char" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-orange-500 outline-none transition"></select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1">備註 (選填)</label>
          <input type="text" id="memo" placeholder="例如：對手愛凹昇龍、下段擇..." class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-orange-500 outline-none transition">
        </div>

        <div class="flex gap-4 pt-2">
          <button id="btn-win" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-lg shadow transition">
            記錄：勝利 (Win)
          </button>
          <button id="btn-loss" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-4 rounded-lg shadow transition">
            記錄：戰敗 (Loss)
          </button>
        </div>
      </div>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
      <h2 class="text-lg font-bold mb-4 text-gray-300">歷史統計 (每日)</h2>
      <div id="history-list" class="space-y-3">
        <p class="text-gray-500 text-sm text-center">載入中...</p>
      </div>
    </div>

    <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">
      <h2 class="text-lg font-bold mb-4 text-gray-300">詳細對戰紀錄 (新至舊)</h2>
      <div id="match-list" class="space-y-3">
        <p class="text-gray-500 text-sm text-center">載入中...</p>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex justify-center items-center px-4 z-50">
    <div class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-600 w-full max-w-sm">
      <h3 class="text-lg font-bold text-white mb-4">編輯對戰紀錄</h3>
      <input type="hidden" id="edit-id">
      
      <div class="space-y-4 mb-6">
        <div>
          <label class="block text-sm text-gray-400 mb-1">我的角色</label>
          <select id="edit-my-char" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white"></select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">對手角色</label>
          <select id="edit-opp-char" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white"></select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">勝負結果</label>
          <select id="edit-result" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
            <option value="win">勝利 (Win)</option>
            <option value="loss">戰敗 (Loss)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">備註</label>
          <input type="text" id="edit-memo" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white">
        </div>
      </div>
      
      <div class="flex gap-3">
        <button onclick="closeEditModal()" class="flex-1 bg-gray-600 hover:bg-gray-500 text-white py-2 rounded transition">取消</button>
        <button onclick="saveEdit()" class="flex-1 bg-orange-600 hover:bg-orange-500 text-white py-2 rounded transition">儲存修改</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCK9wEgSfO68Wfw1t9VGJWMOGcbOFc3LLA",
      authDomain: "sf6wl-d52e0.firebaseapp.com",
      projectId: "sf6wl-d52e0",
      storageBucket: "sf6wl-d52e0.firebasestorage.app",
      messagingSenderId: "942982602876",
      appId: "1:942982602876:web:475733a936b4390bc129f9",
      measurementId: "G-H7QNPQDRVE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const matchesCol = collection(db, "sf6_matches");

    const rawCharacters = [
      "Ryu", "Luke", "Jamie", "Chun-Li", "Guile", "Kimberly", "Juri", "Ken", 
      "Blanka", "Dhalsim", "E.Honda", "Dee Jay", "Manon", "Marisa", "Jp", 
      "Zangief", "Lily", "Cammy", "Rashid", "A.K.I", "Ed", "Gouki", "Vega", 
      "Terry", "Mai", "Elena", "Sagat", "C.Viper", "Alex"
    ];
    
    const characters = rawCharacters.sort((a, b) => a.localeCompare(b));

    const myCharSelect = document.getElementById('my-char');
    const oppCharSelect = document.getElementById('opp-char');
    const editMyCharSelect = document.getElementById('edit-my-char');
    const editOppCharSelect = document.getElementById('edit-opp-char');
    const memoInput = document.getElementById('memo');

    // 暫存目前的對戰紀錄，方便編輯時讀取
    window.currentMatches = [];

    function getTodayString() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function formatTime(timestamp) {
      if (!timestamp) return "剛剛";
      const date = timestamp.toDate();
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      const hh = String(date.getHours()).padStart(2, '0');
      const min = String(date.getMinutes()).padStart(2, '0');
      return `${mm}/${dd} ${hh}:${min}`;
    }

    function initSelects() {
      characters.forEach(char => {
        myCharSelect.add(new Option(char, char));
        oppCharSelect.add(new Option(char, char));
        editMyCharSelect.add(new Option(char, char));
        editOppCharSelect.add(new Option(char, char));
      });
      // 保持之前的預設角色習慣
      myCharSelect.value = "Gouki";
    }

    async function recordMatch(result) {
      const myChar = myCharSelect.value;
      const oppChar = oppCharSelect.value;
      const memoText = memoInput.value.trim(); // 取得備註
      const today = getTodayString();

      const btnWin = document.getElementById('btn-win');
      const btnLoss = document.getElementById('btn-loss');
      btnWin.disabled = true; btnLoss.disabled = true;

      try {
        await addDoc(matchesCol, {
          date: today,
          myChar: myChar,
          oppChar: oppChar,
          result: result,
          memo: memoText, // 寫入備註
          timestamp: serverTimestamp()
        });
        
        memoInput.value = ''; // 成功後清空備註欄位，方便下一場
        await loadStats();
      } catch (e) {
        console.error("寫入失敗: ", e);
        alert("儲存失敗，請檢查網路連線。");
      } finally {
        btnWin.disabled = false; btnLoss.disabled = false;
      }
    }

    async function loadStats() {
      try {
        const q = query(matchesCol, orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        
        const stats = {};
        const allMatches = [];
        
        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const date = data.date;
          
          if (!stats[date]) {
            stats[date] = { wins: 0, losses: 0, total: 0 };
          }
          stats[date].total += 1;
          if (data.result === 'win') stats[date].wins += 1;
          else if (data.result === 'loss') stats[date].losses += 1;

          allMatches.push({
            id: docSnap.id,
            ...data
          });
        });

        window.currentMatches = allMatches; // 儲存到全域變數供編輯使用
        renderStats(stats);
        renderMatchList(allMatches);
      } catch (e) {
        console.error("讀取失敗: ", e);
      }
    }

    function renderStats(stats) {
      const today = getTodayString();
      const historyList = document.getElementById('history-list');
      historyList.innerHTML = '';

      if (stats[today]) {
        const t = stats[today];
        document.getElementById('today-total').textContent = t.total;
        document.getElementById('today-wins').textContent = t.wins;
        document.getElementById('today-losses').textContent = t.losses;
        document.getElementById('today-rate').textContent = Math.round((t.wins / t.total) * 100) + '%';
      } else {
        document.getElementById('today-total').textContent = '0';
        document.getElementById('today-wins').textContent = '0';
        document.getElementById('today-losses').textContent = '0';
        document.getElementById('today-rate').textContent = '0%';
      }

      const sortedDates = Object.keys(stats).sort((a, b) => b.localeCompare(a));
      sortedDates.forEach(date => {
        if (date === today) return; 
        
        const d = stats[date];
        const rate = Math.round((d.wins / d.total) * 100);
        
        const item = document.createElement('div');
        item.className = 'flex justify-between items-center bg-gray-700 p-3 rounded-lg';
        item.innerHTML = `
          <span class="text-gray-300 font-medium">${date}</span>
          <div class="text-sm flex gap-3">
            <span class="text-gray-400">總: <span class="text-white">${d.total}</span></span>
            <span class="text-green-400">勝: <span class="text-white">${d.wins}</span></span>
            <span class="text-red-400">敗: <span class="text-white">${d.losses}</span></span>
            <span class="text-blue-400 w-10 text-right">${rate}%</span>
          </div>
        `;
        historyList.appendChild(item);
      });

      if (historyList.innerHTML === '') historyList.innerHTML = '<p class="text-gray-500 text-sm text-center">尚無歷史紀錄</p>';
    }

    function renderMatchList(matches) {
      const matchList = document.getElementById('match-list');
      matchList.innerHTML = '';

      if (matches.length === 0) {
        matchList.innerHTML = '<p class="text-gray-500 text-sm text-center">尚無對戰紀錄</p>';
        return;
      }

      matches.forEach(match => {
        const isWin = match.result === 'win';
        const resultLabel = isWin ? '<span class="text-green-400 bg-green-900/30 px-2 py-0.5 rounded text-xs border border-green-800">勝</span>' 
                                  : '<span class="text-red-400 bg-red-900/30 px-2 py-0.5 rounded text-xs border border-red-800">敗</span>';
        
        // 判斷是否有備註，有的話加上備註的 HTML
        const memoHtml = match.memo ? `<div class="text-sm text-yellow-500 mt-2 bg-gray-800 p-2 rounded border border-gray-600">📝 ${match.memo}</div>` : '';

        const item = document.createElement('div');
        item.className = 'flex justify-between items-center bg-gray-700 p-3 rounded-lg hover:bg-gray-600 transition';
        item.innerHTML = `
          <div class="flex-1 mr-4">
            <div class="text-xs text-gray-400 mb-1">${match.date} ${formatTime(match.timestamp)}</div>
            <div class="text-sm">
              <span class="font-bold text-white">${match.myChar}</span>
              <span class="text-gray-400 mx-1">vs</span>
              <span class="font-bold text-gray-300">${match.oppChar}</span>
              <span class="ml-2">${resultLabel}</span>
            </div>
            ${memoHtml}
          </div>
          <div class="flex flex-col gap-2 text-sm">
            <button onclick="openEditModal('${match.id}')" class="text-blue-400 hover:text-blue-300 p-1">編輯</button>
            <button onclick="deleteMatch('${match.id}')" class="text-red-400 hover:text-red-300 p-1">刪除</button>
          </div>
        `;
        matchList.appendChild(item);
      });
    }

    window.deleteMatch = async (id) => {
      if (confirm('確定要刪除這筆紀錄嗎？這將會影響統計數據。')) {
        try {
          await deleteDoc(doc(db, "sf6_matches", id));
          await loadStats(); 
        } catch (e) {
          console.error("刪除失敗", e);
          alert("刪除失敗");
        }
      }
    };

    window.openEditModal = (id) => {
      // 從全域變數尋找這筆對戰資料
      const match = window.currentMatches.find(m => m.id === id);
      if (!match) return;

      document.getElementById('edit-id').value = id;
      document.getElementById('edit-my-char').value = match.myChar;
      document.getElementById('edit-opp-char').value = match.oppChar;
      document.getElementById('edit-result').value = match.result;
      document.getElementById('edit-memo').value = match.memo || ''; // 載入舊備註，沒有則空白
      
      document.getElementById('edit-modal').classList.remove('hidden');
    };

    window.closeEditModal = () => {
      document.getElementById('edit-modal').classList.add('hidden');
    };

    window.saveEdit = async () => {
      const id = document.getElementById('edit-id').value;
      const myChar = document.getElementById('edit-my-char').value;
      const oppChar = document.getElementById('edit-opp-char').value;
      const result = document.getElementById('edit-result').value;
      const memo = document.getElementById('edit-memo').value.trim();

      try {
        await updateDoc(doc(db, "sf6_matches", id), {
          myChar: myChar,
          oppChar: oppChar,
          result: result,
          memo: memo // 更新備註
        });
        closeEditModal();
        await loadStats(); 
      } catch (e) {
        console.error("更新失敗", e);
        alert("更新失敗");
      }
    };

    document.getElementById('btn-win').addEventListener('click', () => recordMatch('win'));
    document.getElementById('btn-loss').addEventListener('click', () => recordMatch('loss'));

    initSelects();
    loadStats();

  </script>
</body>
</html>
